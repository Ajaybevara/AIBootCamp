<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Bootcamp</title>

<style>
body {
  margin: 0;
  background: #0a0f2c;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Poppins', sans-serif;
}

/* Poster Container */
.poster-box {
  border: 6px solid gold;
  border-radius: 20px;
  padding: 10px;
  background: linear-gradient(135deg, #0a0f2c, #1a237e);
  box-shadow: 0 0 30px gold;
  transition: 0.4s;
  cursor: pointer;
}

/* Hover Effect */
.poster-box:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px gold, 0 0 80px #ffd700;
}

/* Poster Image */
.poster-box img {
  width: 350px;
  border-radius: 15px;
}

/* Text */
.title {
  color: gold;
  text-align: center;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<a href="register.html">
  <div class="poster-box">
    <h2 class="title">🚀 AI Bootcamp 2026</h2>
    <img src="poster.png">
  </div>
</a>

</body>
</html>
