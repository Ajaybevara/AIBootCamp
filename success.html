<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins';
  background: linear-gradient(135deg, #00b09b, #96c93d);
  text-align: center;
  color: white;
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 40px;
  animation: pop 0.6s ease;
}

button {
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
}

button:hover {
  background: black;
  color: white;
}

@keyframes pop {
  from {transform: scale(0.5);}
  to {transform: scale(1);}
}
</style>
</head>

<body>

<div class="container">
<h1>🎉 Payment Successful!</h1>
<p id="paymentId"></p>

<a href="index.html">
<button>Go Home</button>
</a>
</div>

<script>
document.getElementById("paymentId").innerText =
"Payment ID: " + localStorage.getItem("payment_id");
</script>

</body>
</html>
